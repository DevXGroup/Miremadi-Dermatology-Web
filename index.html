<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miremadi Dermatology Medical Clinic | 55+ Years of Clinical Excellence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Favicon using the skin-layer logo -->
    <meta name="description" content="Miremadi Dermatology Medical Clinic - Providing over 57 years of exceptional dermatological care in La Jolla, CA. Board-certified expertise in medical and cosmetic dermatology.">
    <meta name="keywords" content="dermatology, skin care, La Jolla, Dr. Miremadi, cosmetic dermatology, medical dermatology, skin cancer screening">
    <link rel="icon" type="image/webp" href="/Miremadi-logo.webp">

</head>

<body class="bg-white text-slate-800 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        window.addEventListener('load', () => {
            document.querySelectorAll('section, .reveal-item').forEach(el => {
                el.classList.add('reveal-on-scroll');
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
